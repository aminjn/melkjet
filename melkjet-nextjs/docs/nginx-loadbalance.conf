# لود‌بالانسِ nginx روی ۴ اینستنسِ Next (پورت‌های ۳۰۰۰..۳۰۰۳).
#
# این فایل را در /etc/nginx/ بگذار یا محتوایش را در کانفیگِ موجودِ سایت ادغام کن،
# سپس:  nginx -t && systemctl reload nginx
#
# نکته: ترافیک از آروان (CDN) → این nginx → یکی از ۴ اینستنس. آروان TLS را
# مدیریت می‌کند؛ این nginx فقط روی ۸۰ (یا هر پورتی که origin آروان به آن وصل
# می‌شود) ریورس‌پروکسی می‌کند.

upstream melkjet_app {
    # least_conn = درخواستِ جدید به اینستنسی که کمترین اتصالِ فعال را دارد.
    least_conn;
    server 127.0.0.1:3000 max_fails=3 fail_timeout=15s;
    server 127.0.0.1:3001 max_fails=3 fail_timeout=15s;
    server 127.0.0.1:3002 max_fails=3 fail_timeout=15s;
    server 127.0.0.1:3003 max_fails=3 fail_timeout=15s;
    keepalive 32;
}

server {
    listen 80;
    server_name melkjet.com www.melkjet.com;

    # بادیِ بزرگ (آپلودِ عکس/نقشه) را رد کن.
    client_max_body_size 25m;

    location / {
        proxy_pass http://melkjet_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # اگر یک اینستنس وسطِ ری‌استارت بود، خودکار سراغِ بعدی برو
        # (همان ۵۰۰ روی چانک‌ها دیگر به کاربر نمی‌رسد).
        proxy_next_upstream error timeout http_502 http_503 http_500;
        proxy_connect_timeout 5s;
        proxy_read_timeout 120s;
    }
}
